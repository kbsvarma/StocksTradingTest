# Webull Bull Put Spread Bot — SPX configuration
# Strategy: 0DTE SPX bull put spread, 1% OTM short put, 50pt wide
# VIX gate: 12-25, skip if VIX risen >3pts from open
# Stop: 2x credit received (mark-based, monitor-side)
# No profit target — let 0DTE winners expire worthless

# ── Instrument ────────────────────────────────────────────────────────────────
symbol: "SPXW"                  # Webull uses SPXW for weekly SPX options (not "SPX")
yf_price_symbol: "^GSPC"        # yfinance ticker for SPX index price
yf_options_symbol: "^SPX"       # yfinance ticker for SPX options chain (^SPX has full chain)
spread_width: 50                # points between short and long put

# ── Entry criteria ────────────────────────────────────────────────────────────
otm_pct: 0.010                  # 1% OTM for short put
min_credit: 1.20                # minimum credit to accept (SPX points)
target_credit: 2.00             # target credit for strike scanning
vix_min: 12.0
vix_max: 25.0
vix_max_daily_rise: 3.0         # skip if VIX risen >3pts from day open
direction_filter_enabled: true  # only enter when SPX >= open (bullish day)

# ── Timing (America/New_York) ─────────────────────────────────────────────────
entry_start: "10:30"
entry_end: "14:30"
eod_close_time: "15:45"        # hard close time (0DTE expires at 16:00)
timezone: "America/New_York"
scan_interval_seconds: 30       # how often to scan for entry signal
monitor_interval_seconds: 2     # how often to check open position mark

# ── Sizing ────────────────────────────────────────────────────────────────────
quantity: 1                     # contracts — fixed at 1 for now
trade_once_per_day: true

# ── Exit / risk ───────────────────────────────────────────────────────────────
stop_multiplier: 2.0            # close if mark >= 2x entry credit
disable_profit_target: true     # let 0DTE winners expire worthless

# ── Order execution ───────────────────────────────────────────────────────────
limit_price_offset: 0.10        # bumped 0.05 → 0.10 on 2026-05-14 — wider offset for higher fill rate
max_retries: 3                  # (legacy — not used by new 2-attempt design)
retry_price_step: 0.10          # (legacy — not used by new 2-attempt design)
retry_wait_seconds: 60          # how long to wait for the LIMIT attempt to fill before giving up / falling back
fill_timeout_seconds: 300       # (legacy — not used)
# Entry-retry strategy (post-2026-05-14):
#   1. Place LIMIT at mid - limit_price_offset
#   2. Wait retry_wait_seconds. If filled → done.
#   3. If not filled and entry_market_fallback=true → cancel + place MARKET (one shot).
#      If false → give up cleanly (no walk-down, no further attempts).
entry_market_fallback: false    # default OFF — flip to true if limit-only fails on a session

# ── Account ───────────────────────────────────────────────────────────────────
account_id: "QJJGQCBGAN8M2JL2C1OA1J37KB"

# ── Files ─────────────────────────────────────────────────────────────────────
data_dir: "spx_spread_bot/data/webull_live/vG_spx_w50_vix25"
logs_dir: "spx_spread_bot/logs/webull_live/vG_spx_w50_vix25"
state_file: "spx_spread_bot/data/webull_live/vG_spx_w50_vix25/state.json"
trade_csv: "spx_spread_bot/data/webull_live/vG_spx_w50_vix25/trades.csv"

# ── Run days (0=Mon, 4=Fri) ───────────────────────────────────────────────────
run_days: [0, 1, 2, 3, 4]
